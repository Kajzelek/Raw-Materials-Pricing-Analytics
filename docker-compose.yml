version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: commodity_pricing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: pricing_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pricing_network

volumes:
  postgres_data:

networks:
  pricing_network:
    driver: bridge